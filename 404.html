<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página não encontrada</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      padding: 40px 24px;
    }
    .error-card {
      background: var(--navy-mid);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius-xl);
      padding: 56px 48px;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .error-emoji {
      font-size: 72px;
      display: block;
      margin-bottom: 24px;
      animation: sway 3s ease-in-out infinite;
    }
    @keyframes sway {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg); }
    }
    .error-code {
      font-size: 5rem;
      font-weight: 600;
      color: var(--white);
      font-family: var(--mono);
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -.04em;
    }
    .error-code span { color: var(--blue-light); }
    .error-title {
      font-size: 1.1rem;
      color: var(--slate-soft);
      margin-bottom: 12px;
      font-weight: 400;
    }
    .error-msg {
      font-size: .92rem;
      color: var(--slate);
      line-height: 1.65;
      margin-bottom: 36px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-card">
      <span class="error-emoji">🧻</span>
      <div class="error-code">4<span>0</span>4</div>
      <p class="error-title">Página não encontrada</p>
      <p class="error-msg">"Grandes descobertas começam com erros 404" — algum dev frustrado, provavelmente</p>
      <a href="/" class="btn btn-primary" style="display:inline-flex;margin:0 auto">Voltar para o início</a>
    </div>
  </div>
</body>
</html>
